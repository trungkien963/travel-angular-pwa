<div class="discover">

  <!-- Header -->
  <header class="discover-header">
    <div class="header-content">
      <h1 class="header-title">Community</h1>
      <p class="header-subtitle">Discover amazing journeys from around the world.</p>
    </div>
  </header>

  <!-- Feed -->
  <div class="feed">
    @for (item of feedItems; track item.id) {
      <div class="feed-card" [routerLink]="item.tripId ? ['/trip', item.tripId] : null" [id]="'feed-' + item.id">
        
        <!-- Image & Top Badge -->
        <div class="card-img-wrapper">
          <img [src]="item.image" [alt]="item.title" class="card-img" loading="lazy" />
          <div class="card-badge">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            <span>{{ item.locationType }}</span>
          </div>
        </div>

        <!-- Meta Info -->
        <div class="card-meta">
          <h2 class="card-title">{{ item.title }}</h2>
          
          <div class="card-date">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
            </svg>
            <span>{{ item.dateRange }}</span>
          </div>

          <div class="card-actions">
            <div class="actions-left">
              <button class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
                <span>{{ item.likes }}</span>
              </button>
              <button class="action-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>
                </svg>
                <span>{{ item.comments }}</span>
              </button>
            </div>
            <button class="action-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    }
  </div>

</div>
