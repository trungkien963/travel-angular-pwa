<div class="cropper-layer">
  <div class="top-bar">
    <button class="icon-circle" (click)="abortCropSession()">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5">
        <path d="M18 6 6 18M6 6l12 12" />
      </svg>
    </button>
    <div><span class="crop-title">{{ 'moment.align' | translate }} ({{ currentCropIndex() }}/{{ cropTotal() }})</span></div>
    <div style="width: 44px"></div> <!-- Placeholder for symmetry -->
  </div>

  <div class="camera-lens-wrapper">
    <div class="camera-area-container" style="position: relative; width: 100%; max-width: 500px; aspect-ratio: 1/1;">
      <div class="camera-area" style="max-width: none; width: 100%; height: 100%;">
        @if (currentCrop()) {
          <img [src]="currentCrop()!.url" #cropperImgElement (load)="onCropImgLoad($event)" style="display: block; max-width: 100%;" />
        }
      </div>
    </div>
  </div>

  <div class="camera-bottom-section">
    <div class="crop-hint" style="margin-bottom: 24px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
        stroke-width="2" viewBox="0 0 24 24">
        <path d="M5 9l-3 3 3 3M19 9l3 3-3 3M9 5l3-3 3 3M9 19l3 3 3 3" />
      </svg>
      {{ 'moment.cropHint' | translate }}
    </div>
    <div class="camera-primary-actions" style="padding-bottom: 32px">
      <!-- Discard/Skip (Left) -->
      <button class="icon-circle action-left" (click)="skipCrop()"
        style="background: rgba(255,0,0,0.15); border-color: rgba(255,60,60,0.4)">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="#FF5555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          <line x1="10" y1="11" x2="10" y2="17" />
          <line x1="14" y1="11" x2="14" y2="17" />
        </svg>
      </button>

      <div class="shutter-wrapper"></div>

      <!-- Next / Confirm (Right) -->
      <button class="icon-circle action-right active" (click)="confirmCrop()">
        @if (currentCropIndex() === cropTotal()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="3">
          <path d="M5 12l5 5L20 7" />
        </svg>
        } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
        }
      </button>
    </div>
  </div>
</div>
