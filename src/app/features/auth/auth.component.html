<div class="auth-page">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">
        <span>🏖️</span>
      </div>
      <h1 class="auth-title">
        {{ isLogin() ? 'Welcome Back' : 'Create Account' }}
      </h1>
      <p class="auth-subtitle">
        {{ isLogin() ? 'Sign in to access your travel diaries.' : 'Join WanderPool to plan your next adventure.' }}
      </p>
    </div>

    <!-- Form -->
    <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="auth-form">

      <!-- Email -->
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A8A29E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="16" x="2" y="4" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input
          type="email"
          formControlName="email"
          placeholder="email@address.com"
          autocomplete="email"
          name="email"
          class="auth-input"
        />
      </div>

      <!-- Password -->
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A8A29E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input
          type="password"
          formControlName="password"
          placeholder="Password"
          autocomplete="current-password"
          name="password"
          class="auth-input"
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loading() || authForm.invalid"
        class="btn-submit"
      >
        @if (loading()) {
          <div class="spinner"></div>
        } @else {
          <span class="btn-text">{{ isLogin() ? 'Sign In' : 'Sign Up' }}</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        }
      </button>
    </form>

    <!-- Toggle Mode -->
    <button type="button" (click)="toggleMode()" class="btn-toggle">
      <span class="toggle-text">{{ isLogin() ? "Don't have an account?" : "Already have an account?" }}</span>
      <span class="toggle-action">{{ isLogin() ? 'Sign Up' : 'Sign In' }}</span>
    </button>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Or continue with</span>
      <div class="divider-line"></div>
    </div>

    <!-- Google OAuth -->
    <button type="button" (click)="signInWithGoogle()" class="btn-google">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Google</span>
    </button>

  </div>
</div>
