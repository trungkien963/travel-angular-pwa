<div class="profile-page">

  <!-- Header -->
  <header class="profile-header">
    <h1 class="profile-header__title">Profile</h1>
    <button class="btn-signout" (click)="signOut()" id="btn-signout" title="Sign Out">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </header>

  <!-- User Identity Card -->
  <div class="profile-card">
    @if (avatarUrl()) {
      <img [src]="avatarUrl()!" [alt]="displayName()" class="profile-avatar" />
    } @else {
      <div class="profile-avatar-initial">{{ displayName().charAt(0).toUpperCase() }}</div>
    }
    <div class="profile-info">
      <h2 class="profile-name">{{ displayName() }}</h2>
      <p class="profile-email">{{ email() }}</p>
      <button class="btn-edit" id="btn-edit-profile">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
        <span>EDIT</span>
      </button>
    </div>
  </div>

  <!-- Milestones -->
  <p class="section-label">MILESTONES</p>
  <div class="stats-row">
    <div class="stat-box stat-box--green">
      <span class="stat-number">{{ totalTrips() }}</span>
      <span class="stat-label">Trips</span>
    </div>
    <div class="stat-box stat-box--yellow">
      <span class="stat-number">{{ totalPosts() }}</span>
      <span class="stat-label">Moments</span>
    </div>
    <div class="stat-box stat-box--gray">
      <span class="stat-number">{{ totalMembers() }}</span>
      <span class="stat-label">Friends</span>
    </div>
  </div>

  <!-- Settings -->
  <p class="section-label">SETTINGS</p>
  <div class="settings-block">
    <button class="setting-row" id="setting-preferences">
      <div class="setting-left">
        <div class="setting-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93 17.66 6.34A8 8 0 1 0 6.34 17.66l-1.41 1.41A10 10 0 1 1 19.07 4.93z"/>
          </svg>
        </div>
        <span class="setting-text">Preferences</span>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D4D4D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>

    <button class="setting-row" id="setting-privacy">
      <div class="setting-left">
        <div class="setting-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <span class="setting-text">Privacy &amp; Security</span>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D4D4D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>

    <button class="setting-row setting-row--last" id="setting-help">
      <div class="setting-left">
        <div class="setting-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <span class="setting-text">Help Center</span>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D4D4D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"/>
      </svg>
    </button>
  </div>

  <!-- App Version -->
  <p class="app-version">WanderPool v1.0.0 · Made with ❤️</p>

</div>
