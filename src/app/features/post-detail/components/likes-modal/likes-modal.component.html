<div class="modal-overlay" (click)="closeModal.emit()">
  <div class="modal likes-modal" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
      <h3>Người đã thích</h3>
      <button class="btn-close" (click)="closeModal.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="likes-list-container">
      @if (isLoadingLikes()) {
        <div class="likes-loading">
          <div class="spinner"></div>
        </div>
      } @else if (errorMsg()) {
        <div class="likes-empty" style="color: #EF4444;">
          {{ errorMsg() }}
        </div>
      } @else {
        @if (likesList().length === 0) {
          <div class="likes-empty">
            Chưa có lượt thích nào.
          </div>
        }
        @for (user of likesList(); track user.id) {
          <div class="like-item">
            <div class="like-avatar" [style.background]="!user.avatar ? getAvatarBg(user.name) : ''">
              @if (user.avatar) {
                <img [src]="user.avatar" [alt]="user.name" referrerpolicy="no-referrer" />
              } @else {
                <span [style.color]="getAvatarColor(user.name)">{{ user.name.charAt(0).toUpperCase() }}</span>
              }
            </div>
            <span class="like-name">{{ user.name }}</span>
          </div>
        }
      }
    </div>
  </div>
</div>
