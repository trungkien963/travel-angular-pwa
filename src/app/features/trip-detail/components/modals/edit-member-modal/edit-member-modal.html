<div class="modal-overlay" (click)="closeEditMember()">
  <div class="modal" (click)="$event.stopPropagation()" appSwipeToClose (swipeClose)="closeEditMember()">
    <div class="modal-header">
      <h3>Edit Member</h3>
      <button class="btn-close" (click)="closeEditMember()" id="btn-close-edit-member">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A8A29E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <p class="member-invite-hint">
      Update the display name or email for this member.
    </p>

    <div class="form-field mt-4">
      <label>FULL NAME *</label>
      <input type="text" class="form-input" [(ngModel)]="editMemberName" placeholder="Name" />
    </div>

    <div class="form-field mt-4">
      <label>EMAIL ADDRESS</label>
      <input type="email" class="form-input" [(ngModel)]="editMemberEmail" placeholder="Email" />
    </div>

    <button
      class="btn-primary mt-6"
      (click)="saveEditMember()"
      [disabled]="isSavingMember()"
    >
      {{ isSavingMember() ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>
</div>
