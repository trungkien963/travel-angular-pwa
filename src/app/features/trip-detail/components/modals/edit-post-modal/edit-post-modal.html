<div class="modal-overlay" (click)="closeLocal()">
  <div class="modal" (click)="$event.stopPropagation()" appSwipeToClose (swipeClose)="closeLocal()">
    <div class="modal-header">
      <h3>{{ 'detail.editPost' | translate }}</h3>
      <button class="btn-close" (click)="closeLocal()" id="btn-close-edit-post">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A8A29E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="form-field mt-4">
      <label>{{ 'post.caption' | translate }}</label>
      <textarea
        class="form-input"
        placeholder="Write a caption..."
        [(ngModel)]="editPostContent"
        rows="4"
        id="input-edit-post"
      ></textarea>
    </div>

    <button
      class="btn-primary mt-6"
      (click)="saveEditPost()"
      [disabled]="isSavingPost()"
      id="btn-save-edit-post"
    >
      {{ isSavingPost() ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>
</div>
