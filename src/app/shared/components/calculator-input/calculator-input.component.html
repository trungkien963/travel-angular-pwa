<div class="calc-input-wrapper">
  <!-- Fake Input Display -->
  <div class="fake-input" [ngClass]="customClass" (click)="openKeyboard()" [class.active]="isKeyboardOpen" id="amount-input-fake">
    <span class="value" [class.placeholder]="isKeyboardOpen ? !displayValue : (!amount)">
      {{ isKeyboardOpen ? (displayValue || placeholder) : (amount ? formatNumber(amount) : placeholder) }}
    </span>
    <span class="cursor" *ngIf="isKeyboardOpen">|</span>
  </div>

  <!-- Keyboard Overlay -->
  <ng-container *ngIf="isKeyboardOpen">
    <!-- Backdrop to close when clicking outside -->
    <div class="keyboard-backdrop" (click)="closeKeyboard()"></div>

    <!-- The actual keyboard -->
    <div class="custom-keyboard" (click)="stopPropagation($event)">
      <!-- Suggestions (Smart Chips) inside the top of keyboard sheet -->
      <div class="suggestions-bar" *ngIf="suggestions.length > 0">
        <button *ngFor="let sug of suggestions" class="sug-chip" (click)="applySuggestion(sug)">
          ₫{{ formatNumber(sug) }}
        </button>
      </div>

      <!-- Result preview row -->
      <div class="preview-row" *ngIf="expression && evaluateExpression(expression) !== amount">
        <span class="preview-equal">=</span>
        <span class="preview-val">₫{{ formatNumber(evaluateExpression(expression)) }}</span>
      </div>

      <div class="key-grid">
        <button class="key key-num" (click)="onKeyPress('1', $event)">1</button>
        <button class="key key-num" (click)="onKeyPress('2', $event)">2</button>
        <button class="key key-num" (click)="onKeyPress('3', $event)">3</button>
        <button class="key key-op" (click)="onKeyPress('/', $event)">÷</button>

        <button class="key key-num" (click)="onKeyPress('4', $event)">4</button>
        <button class="key key-num" (click)="onKeyPress('5', $event)">5</button>
        <button class="key key-num" (click)="onKeyPress('6', $event)">6</button>
        <button class="key key-op" (click)="onKeyPress('x', $event)">×</button>

        <button class="key key-num" (click)="onKeyPress('7', $event)">7</button>
        <button class="key key-num" (click)="onKeyPress('8', $event)">8</button>
        <button class="key key-num" (click)="onKeyPress('9', $event)">9</button>
        <button class="key key-op" (click)="onKeyPress('-', $event)">-</button>

        <button class="key key-num font-sm" (click)="onKeyPress('000', $event)">000</button>
        <button class="key key-num" (click)="onKeyPress('0', $event)">0</button>
        <button class="key key-del" (click)="onKeyPress('BACKSPACE', $event)">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" x2="12" y1="9" y2="15"/><line x1="12" x2="18" y1="9" y2="15"/></svg>
        </button>
        <button class="key key-op" (click)="onKeyPress('+', $event)">+</button>
        
        <!-- Big Done Key spans 2 columns maybe? Standard layout ends here. Wait, layout above is 4 columns x 4 rows. -->
      </div>
      
      <!-- Big checkmark button or Done button -->
      <button class="btn-done" (click)="closeKeyboard()">Done</button>
    </div>
  </ng-container>
</div>
