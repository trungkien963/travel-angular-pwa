<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WanderPool — Travel Together</title>
    <base href="/" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- SEO -->
    <meta name="description" content="Travel together, share moments, split expenses. WanderPool is your social travel companion." />
    <meta name="keywords" content="travel, trip, expenses, friends, social, wanderpool" />
    <meta name="author" content="WanderPool" />

    <!-- PWA theme -->
    <meta name="theme-color" content="#FFC800" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="WanderPool" />

    <!-- Apple PWA (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WanderPool" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png" />

    <!-- Microsoft PWA -->
    <meta name="msapplication-TileImage" content="icons/icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#FFC800" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WanderPool — Travel Together" />
    <meta property="og:description" content="Plan trips, share moments, and split expenses with your travel crew." />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Favicon & Manifest -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent pinch-to-zoom on iOS Safari -->
    <script>
      document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
      document.addEventListener('gestureend', function (e) { e.preventDefault(); });
      document.addEventListener('touchmove', function(e) {
        if (e.touches && e.touches.length > 1) {
          e.preventDefault();
        }
      }, { passive: false });
    </script>
  </head>
  <body>
    <app-root>
      <style>
        body, html {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          background: #FAFAFA;
        }
        .splash-container {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: radial-gradient(circle at center, #ffffff 0%, #f3f4f6 100%);
          z-index: 99999;
          font-family: 'Inter', sans-serif;
          overflow: hidden;
        }
        
        /* Interactive Liquid Orbs */
        .splash-orbs {
          position: absolute;
          inset: 0;
          overflow: hidden;
          z-index: 1;
        }
        .s-orb {
          position: absolute;
          border-radius: 50%;
          filter: blur(60px);
          opacity: 0.55;
          animation: splash-float 8s infinite alternate ease-in-out;
        }
        .s-orb-1 {
          width: 320px; height: 320px;
          background: #FFC800; /* WanderPool Yellow */
          top: -120px; right: -80px;
          animation-delay: 0s;
        }
        .s-orb-2 {
          width: 280px; height: 280px;
          background: #FF5A5F; /* Coral / Pinkish */
          bottom: -80px; left: -120px;
          animation-delay: -3s;
        }
        
        @keyframes splash-float {
          0% { transform: translate(0, 0) scale(1); }
          100% { transform: translate(40px, 50px) scale(1.15); }
        }

        /* Glassmorphism Card */
        .splash-glass {
          position: relative;
          z-index: 2;
          background: rgba(255, 255, 255, 0.65);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border: 1px solid rgba(255, 255, 255, 0.6);
          border-radius: 36px;
          padding: 48px 40px;
          box-shadow: 
            0 24px 48px -12px rgba(0,0,0,0.08),
            inset 0 0 0 1px rgba(255,255,255,0.5);
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        /* App Icon spinning */
        .splash-icon {
          width: 72px;
          height: 72px;
          background: linear-gradient(135deg, #FFC800 0%, #FF8A00 100%);
          border-radius: 24px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 36px;
          box-shadow: 0 16px 32px rgba(255, 200, 0, 0.35);
          animation: pulse-icon 2s infinite ease-in-out;
          margin-bottom: 24px;
        }
        
        @keyframes pulse-icon {
          0% { transform: scale(1); box-shadow: 0 16px 32px rgba(255, 200, 0, 0.35); }
          50% { transform: scale(1.08); box-shadow: 0 24px 48px rgba(255, 200, 0, 0.5); }
          100% { transform: scale(1); box-shadow: 0 16px 32px rgba(255, 200, 0, 0.35); }
        }

        /* Logo Text */
        .splash-title {
          font-size: 28px;
          font-weight: 800;
          letter-spacing: -0.5px;
          margin: 0 0 8px 0;
          background: linear-gradient(to right, #1f2937, #4b5563);
          -webkit-background-clip: text;
          color: transparent;
        }

        /* Subtitle */
        .splash-subtitle {
          font-size: 15px;
          font-weight: 500;
          color: #6b7280;
          margin: 0 0 36px 0;
        }

        /* Custom Modern Loader */
        .splash-loader {
          display: flex;
          gap: 6px;
        }
        .splash-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: #FFC800;
          animation: dot-bounce 1.4s infinite ease-in-out both;
        }
        .splash-dot:nth-child(1) { animation-delay: -0.32s; }
        .splash-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes dot-bounce {
          0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
          40% { transform: scale(1); opacity: 1; }
        }

        /* Landscape Blocker Overlay */
        @media screen and (max-width: 900px) and (orientation: landscape) {
          body::after {
            content: "🔄 Vui lòng xoay dọc màn hình để sử dụng WanderPool";
            position: fixed;
            inset: 0;
            z-index: 2147483647;
            background: #1C1917;
            color: #FFC800;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            padding: 40px;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            box-sizing: border-box;
          }
          
          app-root {
            display: none !important;
          }
        }
      </style>

      <div class="splash-container">
        <!-- Floating Ambient Background -->
        <div class="splash-orbs">
          <div class="s-orb s-orb-1"></div>
          <div class="s-orb s-orb-2"></div>
        </div>

        <!-- Glass Content -->
        <div class="splash-glass">
          <div class="splash-icon">🏖️</div>
          <h1 class="splash-title">WanderPool</h1>
          <p class="splash-subtitle">Preparing your adventure...</p>
          
          <div class="splash-loader">
            <div class="splash-dot"></div>
            <div class="splash-dot"></div>
            <div class="splash-dot"></div>
          </div>
        </div>
      </div>
    </app-root>
    <noscript>Please enable JavaScript to continue using WanderPool.</noscript>
  </body>
</html>
